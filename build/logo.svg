<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0b1a44" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Achtergrond: afgeronde vierkant met gradient -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>

  <!-- Klantenlijst-kaart achter het vergrootglas -->
  <g filter="url(#shadow)">
    <rect x="128" y="112" width="196" height="248" rx="26" fill="#ffffff" opacity="0.16"/>
    <rect x="160" y="156" width="132" height="20" rx="10" fill="#ffffff" opacity="0.9"/>
    <rect x="160" y="196" width="104" height="16" rx="8" fill="#ffffff" opacity="0.6"/>
    <rect x="160" y="228" width="120" height="16" rx="8" fill="#ffffff" opacity="0.6"/>
    <rect x="160" y="260" width="88" height="16" rx="8" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Vergrootglas -->
  <g filter="url(#shadow)">
    <circle cx="300" cy="292" r="96" fill="none" stroke="url(#glass)" stroke-width="34"/>
    <circle cx="300" cy="292" r="79" fill="#ffffff" opacity="0.12"/>
    <rect x="356" y="352" width="118" height="42" rx="21"
          transform="rotate(45 356 352)" fill="url(#glass)"/>
  </g>
</svg>
