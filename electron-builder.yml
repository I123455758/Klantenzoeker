# LET OP: electron-builder is bewust gepind op 24.13.3 (zie package.json).
# electron-builder 25.x reconstrueert de node_modules-layout en plaatst gehoiste
# transitieve deps (o.a. call-bind-apply-helpers via pdfkit) op de verkeerde plek,
# waardoor require() faalt en de verpakte app zonder venster opstart. v24 kopieert
# de schijf-layout intact. Niet upgraden zonder de verpakte .exe te testen.
appId: be.klantenzoeker.app
productName: Klantenzoeker
copyright: Klantenzoeker

directories:
  output: dist
  buildResources: build

# Gebouwde output, manifest én de node_modules (electron-builder snoeit
# automatisch de devDependencies eruit; de productie-afhankelijkheden blijven).
files:
  - out/**
  - package.json
  - node_modules/**

# Native/asset-modules moeten buiten de asar leven:
# - better-sqlite3: native .node-binary
# - pdfjs-dist: worker wordt via import() van een bestandspad geladen
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/pdfjs-dist/**

# We hebben better-sqlite3 al voor de Electron-ABI herbouwd; niet opnieuw bouwen
# (er is geen MSVC-compiler beschikbaar).
npmRebuild: false

win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Klantenzoeker
